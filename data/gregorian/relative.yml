#? relative: rule-based (e.g. first Monday, weekday offsets, etc.)

events:
  - id: gregorian-mothers-day
    type: relative
    rule:
      base: nth-weekday-of-month
      month: 5
      weekday: 0
      occurrence: second
    title:
      fa: روز جهانی مادر
      en: World Mother's Day
    categories: [international]
    isHolidayInIran: false

  - id: gregorian-thanksgiving
    type: relative
    rule:
      base: nth-weekday-of-month
      month: 11
      weekday: 4
      occurrence: fourth
    title:
      fa: روز شکرگزاری
      en: Thanksgiving Day
    categories: [international]
    isHolidayInIran: false

  - id: gregorian-easter
    type: relative
    rule:
      base: computus # Easter uses Computus algorithm — year-dependent
      offsetDays: 0
    title:
      fa: عید پاک
      en: Easter Sunday
    categories: [international, religious]
    isHolidayInIran: false

  - id: gregorian-migratory-bird-day-may
    type: relative
    rule:
      base: nth-weekday-of-month
      month: 5
      weekday: 6
      occurrence: second
    title:
      fa: روز جهانی پرندگان مهاجر بهار
      en: World Migratory Bird Day (Spring)
    categories: [international, united_nations]
    isHolidayInIran: false

  - id: gregorian-migratory-bird-day-october
    type: relative
    rule:
      base: nth-weekday-of-month
      month: 10
      weekday: 6
      occurrence: second
    title:
      fa: روز جهانی پرندگان مهاجر پاییز
      en: World Migratory Bird Day (Autumn)
    categories: [international, united_nations]
    isHolidayInIran: false

  - id: gregorian-maritime-day
    type: relative
    rule:
      base: month-weekday
      month: 9
      weekday: 4
      occurrence: last
    title:
      fa: روز جهانی دریانوردی
      en: World Maritime Day
    categories: [international, united_nations]
    isHolidayInIran: false
